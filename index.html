<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jadwal Sholat - BQ Islamic Boarding School</title>
  <link rel="stylesheet" href="CSS/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <nav>
      <a href="#" class="logo">
        <img src="Image/bq.png" alt="BQ Islamic Boarding School Logo" class="navbar-logo">
        <span>BQ Islamic Boarding School</span>
      </a>
    </nav>
  </header>

  <main>
    <div class="container">
      <div class="top-info">
        <div class="location-display">
          <h1 id="lokasi">Memuat lokasi...</h1>
          <p id="tanggal-hari-ini">Memuat tanggal...</p>
        </div>
        <div class="clock-display">
          <p id="live-clock">--:--:--</p>
        </div>
      </div>

      <div id="next-prayer-info" class="next-prayer-info">
        <h2>Waktu Sholat Berikutnya</h2>
        <p>
          <span id="next-prayer-name">---</span> dalam 
          <span id="countdown-timer">--:--:--</span>
        </p>
      </div>
     

      <div class="jadwal-cards">
        <div class="card"><h2>Subuh</h2><p id="subuh">04:16</p></div>
        <div class="card"><h2>Dzuhur</h2><p id="dzuhur">11:42</p></div>
        <div class="card"><h2>Ashar</h2><p id="ashar">14:46</p></div>
        <div class="card"><h2>Maghrib</h2><p id="maghrib">17:49</p></div>
        <div class="card"><h2>Isya</h2><p id="isya">18:58</p></div>
      </div>


      <div class="location-feature"> 
        <div class="search-box">
          <input type="text" id="search-input" placeholder="Cari nama kota...">
          <button id="search-button">Cari</button>
        </div>
        <button id="detect-location-button">Gunakan Lokasi Saat Ini</button>
      </div>
      <div id="search-results" class="search-results"></div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 - Hakam. Data By Kemenag.</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
